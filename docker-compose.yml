# Docker Compose deployment for the emotion diary system.
# Services stay on an internal Docker network except the frontend Nginx port.
services:
  mysql:
    image: mysql:5.7
    container_name: bishe-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env.docker}
      MYSQL_DATABASE: bishe_backend
      MYSQL_USER: ${MYSQL_USER:-bishe_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env.docker}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./houduan/backend
      dockerfile: Dockerfile
    image: bishe-backend:latest
    container_name: bishe-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bishe_backend?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-bishe_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env.docker}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.docker}
      LLM_API_KEY: ${LLM_API_KEY:?Set LLM_API_KEY in .env.docker}
      LLM_BASE_URL: ${LLM_BASE_URL:?Set LLM_BASE_URL in .env.docker}
      LLM_MODEL: ${LLM_MODEL:?Set LLM_MODEL in .env.docker}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
    expose:
      - "8080"

  frontend:
    build:
      context: ./qianduan/frontend
      dockerfile: Dockerfile
    image: bishe-frontend:latest
    container_name: bishe-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  mysql_data:
