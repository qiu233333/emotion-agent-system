server:
  port: 8080

  servlet:
    context-path: /api

spring:
  application:
    name: backend

  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:../../.env[.properties]
      - optional:file:../../../.env[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/bishe_backend?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.bishe.backend.entity

jwt:
  secret: bishe-emotion-system-secret-key-change-me-2026
  expire-hours: 24

llm:
  api-key: ${LLM_API_KEY:}
  base-url: ${LLM_BASE_URL:https://api.example.com}
  model: ${LLM_MODEL:your_model_name}
  timeout-seconds: ${LLM_TIMEOUT_SECONDS:30}
